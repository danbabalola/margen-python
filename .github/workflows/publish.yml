name: Publish to PyPI

# Publishes `margen` to PyPI on a version tag (e.g. v0.1.0), via PyPI Trusted
# Publishing (OIDC) — no API token. The PyPI trusted publisher must be:
#   project: margen | owner: danbabalola | repo: margen_python
#   workflow: publish.yml | environment: pypi
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
